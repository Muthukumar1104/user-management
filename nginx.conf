# -------------------------------------------------------
# Nginx Configuration
#
# Serves the React/Vite production build.
#
# Supports:
# • React Router
# • Browser Refresh
# • Deep Linking
# • Client-Side Routing
# -------------------------------------------------------

server {

    # -------------------------------------------------------
    # Listen on HTTP Port 80
    # -------------------------------------------------------
    listen 80;

    # Server hostname
    server_name localhost;

    # -------------------------------------------------------
    # Root Directory
    #
    # This is where the React production build
    # (dist folder) is copied inside the Docker image.
    #
    # Dockerfile:
    # COPY --from=builder /app/dist /usr/share/nginx/html
    # -------------------------------------------------------
    root /usr/share/nginx/html;

    # Default page
    index index.html;

    # -------------------------------------------------------
    # React Router Support
    #
    # try_files checks:
    #
    # 1. Requested file
    # 2. Requested directory
    # 3. Fallback to index.html
    #
    # Without this configuration:
    #
    # http://localhost:5173/users
    # http://localhost:5173/auth/login
    #
    # would return:
    #     404 Not Found
    #
    # Instead, Nginx always serves index.html,
    # allowing React Router to handle navigation.
    # -------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }
}