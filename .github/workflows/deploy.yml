name: Deploy to Production

# Trigger this workflow only after code is merged into the main branch
on:
  push:
    branches:
      - main

# Required permissions
permissions:
  contents: read
  packages: write

jobs:
  deploy:
    name: Build Docker & Deploy to Vercel
    runs-on: ubuntu-latest

    steps:
      # -------------------------------------------------------
      # Checkout the latest source code
      # -------------------------------------------------------
      - name: Checkout Repository
        uses: actions/checkout@v4

      # -------------------------------------------------------
      # Setup Node.js
      # -------------------------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # -------------------------------------------------------
      # Install project dependencies
      # -------------------------------------------------------
      - name: Install Dependencies
        run: npm ci

      # -------------------------------------------------------
      # Convert GitHub repository owner to lowercase
      # Docker image names must always be lowercase.
      # Example:
      #   GitHub Owner : Muthukumar1104
      #   Docker Image : ghcr.io/muthukumar1104/user-management
      # -------------------------------------------------------
      - name: Set Docker Image Name
        run: |
          IMAGE_NAME=$(echo "ghcr.io/${{ github.repository_owner }}/user-management" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_ENV

      # -------------------------------------------------------
      # Login to GitHub Container Registry (GHCR)
      # -------------------------------------------------------
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # -------------------------------------------------------
      # Build Docker Image
      #
      # Creates:
      #   latest
      #   commit SHA
      # -------------------------------------------------------
      - name: Build Docker Image
        run: |
          docker build \
            -t $IMAGE_NAME:latest \
            -t $IMAGE_NAME:${{ github.sha }} \
            .

      # -------------------------------------------------------
      # Push Docker Images to GitHub Container Registry
      # -------------------------------------------------------
      - name: Push Docker Images
        run: |
          docker push $IMAGE_NAME:latest
          docker push $IMAGE_NAME:${{ github.sha }}

      # -------------------------------------------------------
      # Install Vercel CLI
      # -------------------------------------------------------
      - name: Install Vercel CLI
        run: npm install -g vercel

      # -------------------------------------------------------
      # Pull Vercel Project Configuration
      # -------------------------------------------------------
      - name: Pull Vercel Environment
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          vercel pull \
            --yes \
            --environment=production \
            --token=$VERCEL_TOKEN

      # -------------------------------------------------------
      # Build Production Deployment
      # -------------------------------------------------------
      - name: Build with Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          vercel build \
            --prod \
            --token=$VERCEL_TOKEN

      # -------------------------------------------------------
      # Deploy to Production
      # -------------------------------------------------------
      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          vercel deploy \
            --prebuilt \
            --prod \
            --token=$VERCEL_TOKEN

      # -------------------------------------------------------
      # Deployment Summary
      # -------------------------------------------------------
      - name: Deployment Complete
        run: |
          echo "=============================================="
          echo "✅ Deployment completed successfully!"
          echo ""
          echo "Docker Images:"
          echo "$IMAGE_NAME:latest"
          echo "$IMAGE_NAME:${{ github.sha }}"
          echo ""
          echo "Vercel Production deployment completed."
          echo "=============================================="